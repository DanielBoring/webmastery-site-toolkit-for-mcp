name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          fetch-depth: 1

      - name: Validate release inputs
        id: validate
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          TAG_VERSION="$VERSION"
          PLUGIN_VERSION="$(grep -E '^[[:space:]]*\*?[[:space:]]*Version:[[:space:]]*[0-9]+\.[0-9]+\.[0-9]+' unlock-mcp-potential.php | head -1 | sed -E 's/.*Version:[[:space:]]*([0-9]+\.[0-9]+\.[0-9]+).*/\1/')"
          TEXT_DOMAIN="$(grep -E '^[[:space:]]*\*?[[:space:]]*Text Domain:' unlock-mcp-potential.php | head -1 | sed -E 's/.*Text Domain:[[:space:]]*//' | tr -d '\r')"
          STABLE_TAG="$(grep -Ei '^Stable tag:' readme.txt | head -1 | sed -E 's/^Stable tag:[[:space:]]*//I' | tr -d '\r')"
          SHORT_DESCRIPTION="$(awk 'BEGIN{after_header=0} /^Donate link:/ {after_header=1; next} after_header && NF {print; exit}' readme.txt | tr -d '\r')"

          if [ -z "$PLUGIN_VERSION" ]; then
            echo "Could not parse plugin version from unlock-mcp-potential.php" >&2
            exit 1
          fi
          if [ "$TEXT_DOMAIN" != "unlock-mcp-potential" ]; then
            echo "Text Domain ($TEXT_DOMAIN) does not match canonical slug unlock-mcp-potential" >&2
            exit 1
          fi
          if [ -z "$STABLE_TAG" ]; then
            echo "Could not parse Stable tag from readme.txt" >&2
            exit 1
          fi
          if [ ${#SHORT_DESCRIPTION} -gt 150 ]; then
            echo "readme.txt short description is ${#SHORT_DESCRIPTION} characters; WordPress.org supports a maximum of 150" >&2
            exit 1
          fi
          if [ "$TAG_VERSION" != "$PLUGIN_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match plugin header version ($PLUGIN_VERSION)" >&2
            exit 1
          fi
          if [ "$TAG_VERSION" != "$STABLE_TAG" ]; then
            echo "Tag version ($TAG_VERSION) does not match readme stable tag ($STABLE_TAG)" >&2
            exit 1
          fi

          RELEASE_TAG="v$TAG_VERSION"
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists; refusing duplicate publish" >&2
            exit 1
          fi

          NOTES_FILE="build/release-notes-${TAG_VERSION}.md"
          mkdir -p build
          NOTES="$(awk "/^= ${TAG_VERSION} =/{found=1; next} found && /^= /{exit} found{print}" readme.txt | sed '/^[[:space:]]*$/d')"
          if [ -z "$NOTES" ]; then
            echo "No plugin release notes found in readme.txt for version ${TAG_VERSION}" >&2
            exit 1
          fi
          printf '%s\n' "$NOTES" > "$NOTES_FILE"

          echo "version=$TAG_VERSION" >> "$GITHUB_OUTPUT"
          echo "notes-file=$NOTES_FILE" >> "$GITHUB_OUTPUT"

      - name: Build plugin zip
        shell: bash
        run: |
          set -euo pipefail
          PACKAGE_DIR="build/unlock-mcp-potential"
          rm -rf "$PACKAGE_DIR"
          mkdir -p "$PACKAGE_DIR"
          rsync -r unlock-mcp-potential.php readme.txt LICENSE includes "$PACKAGE_DIR/"
          cd build
          zip -r ../unlock-mcp-potential-${{ steps.validate.outputs.version }}.zip unlock-mcp-potential/

      - name: Validate built artifact contents
        shell: bash
        run: |
          set -euo pipefail
          ZIP_FILE="unlock-mcp-potential-${{ steps.validate.outputs.version }}.zip"
          if [ ! -s "$ZIP_FILE" ]; then
            echo "Missing or empty release artifact: $ZIP_FILE" >&2
            exit 1
          fi
          unzip -l "$ZIP_FILE" > build/zip-listing.txt
          grep -q 'unlock-mcp-potential/unlock-mcp-potential.php' build/zip-listing.txt
          grep -q 'unlock-mcp-potential/includes/' build/zip-listing.txt
          if grep -E 'unlock-mcp-potential/(\.git|\.github|assets|build|e2e-artifacts|scripts|tests|vendor)/|unlock-mcp-potential/(BACKLOG|CHANGELOG|CONTRIBUTING|README)\.md|unlock-mcp-potential/(composer\.(json|lock)|docker-compose\.yml|phpcs\.xml\.dist|\.gitattributes|\.gitignore)' build/zip-listing.txt; then
            echo "Release artifact contains development, CI, test, or repository-only files" >&2
            exit 1
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.validate.outputs.version }}"
          gh release create "v${VERSION}" \
            "unlock-mcp-potential-${VERSION}.zip" \
            --title "v${VERSION}" \
            --notes-file "${{ steps.validate.outputs.notes-file }}"
