name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          fetch-depth: 1

      - name: Set up PHP
        uses: shivammathur/setup-php@bf6b4fbd49ca58e4608c9c89fba0b8d90bd2a39f # 2.35.5
        with:
          php-version: '8.0'
          coverage: none

      - name: Validate release inputs
        id: validate
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          TAG_VERSION="$VERSION"
          PLUGIN_VERSION="$(grep -E '^[[:space:]]*\*?[[:space:]]*Version:[[:space:]]*[0-9]+\.[0-9]+\.[0-9]+' webmastery-site-toolkit-for-mcp.php | head -1 | sed -E 's/.*Version:[[:space:]]*([0-9]+\.[0-9]+\.[0-9]+).*/\1/')"
          TEXT_DOMAIN="$(grep -E '^[[:space:]]*\*?[[:space:]]*Text Domain:' webmastery-site-toolkit-for-mcp.php | head -1 | sed -E 's/.*Text Domain:[[:space:]]*//' | tr -d '\r')"
          STABLE_TAG="$(grep -Ei '^Stable tag:' readme.txt | head -1 | sed -E 's/^Stable tag:[[:space:]]*//I' | tr -d '\r')"
          SHORT_DESCRIPTION="$(awk 'BEGIN{after_header=0} /^Donate link:/ {after_header=1; next} after_header && NF {print; exit}' readme.txt | tr -d '\r')"

          if [ -z "$PLUGIN_VERSION" ]; then
            echo "Could not parse plugin version from webmastery-site-toolkit-for-mcp.php" >&2
            exit 1
          fi
          if [ "$TEXT_DOMAIN" != "webmastery-site-toolkit-for-mcp" ]; then
            echo "Text Domain ($TEXT_DOMAIN) does not match canonical slug webmastery-site-toolkit-for-mcp" >&2
            exit 1
          fi
          if [ -z "$STABLE_TAG" ]; then
            echo "Could not parse Stable tag from readme.txt" >&2
            exit 1
          fi
          if [ ${#SHORT_DESCRIPTION} -gt 150 ]; then
            echo "readme.txt short description is ${#SHORT_DESCRIPTION} characters; WordPress.org supports a maximum of 150" >&2
            exit 1
          fi
          if [ "$TAG_VERSION" != "$PLUGIN_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match plugin header version ($PLUGIN_VERSION)" >&2
            exit 1
          fi
          if [ "$TAG_VERSION" != "$STABLE_TAG" ]; then
            echo "Tag version ($TAG_VERSION) does not match readme stable tag ($STABLE_TAG)" >&2
            exit 1
          fi

          RELEASE_TAG="v$TAG_VERSION"
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists; refusing duplicate publish" >&2
            exit 1
          fi

          NOTES_FILE="build/release-notes-${TAG_VERSION}.md"
          mkdir -p build
          NOTES="$(awk "/^= ${TAG_VERSION} =/{found=1; next} found && /^= /{exit} found{print}" readme.txt | sed '/^[[:space:]]*$/d')"
          if [ -z "$NOTES" ]; then
            echo "No plugin release notes found in readme.txt for version ${TAG_VERSION}" >&2
            exit 1
          fi
          printf '%s\n' "$NOTES" > "$NOTES_FILE"

          echo "version=$TAG_VERSION" >> "$GITHUB_OUTPUT"
          echo "notes-file=$NOTES_FILE" >> "$GITHUB_OUTPUT"

      - name: Run Release Package QA
        run: bash scripts/release-qa.sh "${{ steps.validate.outputs.version }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.validate.outputs.version }}"
          gh release create "v${VERSION}" \
            "webmastery-site-toolkit-for-mcp-${VERSION}.zip" \
            --title "v${VERSION}" \
            --notes-file "${{ steps.validate.outputs.notes-file }}"
