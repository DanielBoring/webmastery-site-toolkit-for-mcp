name: Auto-create PR from Issue

on:
  issues:
    types: [labeled]

permissions:
  issues: write
  pull-requests: write
  contents: write

jobs:
  auto-create-pr:
    if: contains(github.event.issue.labels.*.name, 'ready-for-dev')
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Create PR from issue
        id: create-pr
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.issue;
            const branchName = `issue-${issue.number}`;
            const prTitle = `Resolve issue #${issue.number}: ${context.payload.issue.title}`;
            
            // Check if PR already exists
            const prs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:${branchName}`
            });
            
            if (prs.data.length > 0) {
              console.log(`PR already exists: ${prs.data[0].html_url}`);
              return;
            }
            
            // Create branch from main
            const ref = await github.rest.git.getRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: 'heads/main'
            });
            
            const newRef = await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/heads/${branchName}`,
              sha: ref.data.object.sha
            });
            
            // Create PR body with issue context
            const prBody = `## Closes
            Closes #${issue.number}
            
## Issue Summary
${context.payload.issue.body || 'See linked issue'}

## Acceptance Criteria
<!-- Add acceptance criteria from issue -->

## Testing
<!-- E2E QA will be added by automation -->
`;
            
            // Create pull request
            const pr = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: prTitle,
              head: branchName,
              base: 'main',
              body: prBody,
              draft: false
            });
            
            console.log(`Created PR: ${pr.data.html_url}`);
            
            // Add comment to issue linking the PR
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: `🤖 Automated PR created: #${pr.data.number}\n\nReady for development. E2E QA will run automatically on push.`
            });
            
            core.setOutput('pr-number', pr.data.number);
            core.setOutput('pr-url', pr.data.html_url);
