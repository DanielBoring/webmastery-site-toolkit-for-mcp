name: E2E QA Testing

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main, develop]

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      should-run: ${{ steps.filter.outputs.should-run }}
      changed-files: ${{ steps.filter.outputs.changed-files }}
    steps:
      - name: Checkout code
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          fetch-depth: 0

      - name: Detect relevant file changes
        id: filter
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should-run=true" >> "$GITHUB_OUTPUT"
            echo "changed-files=manual-dispatch" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
            MERGE_BASE="$(git merge-base "$BASE_SHA" "$HEAD_SHA" || true)"
            if [ -z "$MERGE_BASE" ]; then
              MERGE_BASE="$BASE_SHA"
            fi
            CHANGED_FILES="$(git diff --name-only "$MERGE_BASE" "$HEAD_SHA")"
          else
            BEFORE_SHA="${{ github.event.before }}"
            if [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
              CHANGED_FILES="$(git diff-tree --no-commit-id --name-only -r "${{ github.sha }}")"
            else
              CHANGED_FILES="$(git diff --name-only "$BEFORE_SHA" "${{ github.sha }}")"
            fi
          fi

          printf '%s\n' "$CHANGED_FILES"

          if printf '%s\n' "$CHANGED_FILES" | grep -Eq '^(\.github/workflows/e2e-qa\.yml|docker-compose\.yml|scripts/e2e-test\.sh|tests/e2e/|includes/|unlock-mcp-potential\.php|readme\.txt|composer\.(json|lock)|phpcs\.xml\.dist|assets/)'; then
            echo "should-run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should-run=false" >> "$GITHUB_OUTPUT"
          fi

          {
            echo 'changed-files<<EOF'
            printf '%s\n' "$CHANGED_FILES"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

  e2e-test:
    needs: changes
    if: needs.changes.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      COMPOSE_PROJECT_NAME: unlock-mcp-potential-${{ github.event.pull_request.number || github.run_id }}
      MYSQL_PORT: 0
      WORDPRESS_PORT: 0
    permissions:
      contents: read
    outputs:
      wordpress-image: ${{ steps.versions.outputs.wordpress-image }}
      wordpress-version: ${{ steps.versions.outputs.wordpress-version }}
      php-version: ${{ steps.versions.outputs.php-version }}
      mysql-image: ${{ steps.versions.outputs.mysql-image }}
      mysql-version: ${{ steps.versions.outputs.mysql-version }}
      mcp-adapter-release: ${{ steps.versions.outputs.mcp-adapter-release }}
      mcp-adapter-version: ${{ steps.versions.outputs.mcp-adapter-version }}
      plugin-version: ${{ steps.versions.outputs.plugin-version }}
      registered-abilities: ${{ steps.versions.outputs.registered-abilities }}
      covered-abilities: ${{ steps.versions.outputs.covered-abilities }}
      test-cases: ${{ steps.versions.outputs.test-cases }}
      negative-cases: ${{ steps.versions.outputs.negative-cases }}
    steps:
      - name: Checkout code
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          fetch-depth: 1

      - name: Set up Docker Compose
        run: docker compose version

      - name: Start WordPress stack
        run: |
          docker compose down -v --remove-orphans
          docker compose up -d

      - name: Run E2E tests
        run: bash scripts/e2e-test.sh

      - name: Collect tested versions
        id: versions
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          wordpress_image="$(docker compose config | awk '$1 == "image:" && $2 ~ /^wordpress:/ { print $2; exit }')"
          mysql_image="$(docker compose config | awk '$1 == "image:" && $2 ~ /^mysql:/ { print $2; exit }')"
          wordpress_version="$(docker compose exec -T wordpress wp --allow-root core version 2>/dev/null || echo unknown)"
          php_version="$(docker compose exec -T wordpress php -r 'echo PHP_VERSION;' 2>/dev/null || echo unknown)"
          mysql_version="$(docker compose exec -T mysql mysql --version 2>/dev/null || echo unknown)"
          mcp_adapter_release="$(grep '^MCP_ADAPTER_ZIP=' scripts/e2e-test.sh | sed -E 's#.*releases/download/([^/]+)/.*#\1#')"
          mcp_adapter_version="$(docker compose exec -T wordpress wp --allow-root plugin get mcp-adapter --field=version 2>/dev/null || echo unknown)"
          plugin_version="$(docker compose exec -T wordpress wp --allow-root plugin get unlock-mcp-potential --field=version 2>/dev/null || echo unknown)"
          summary_file="e2e-artifacts/e2e-summary.json"
          registered_abilities="$(jq -r '.registered_abilities // "unknown"' "$summary_file" 2>/dev/null || echo unknown)"
          covered_abilities="$(jq -r '.covered_abilities // "unknown"' "$summary_file" 2>/dev/null || echo unknown)"
          test_cases="$(jq -r '.test_cases // "unknown"' "$summary_file" 2>/dev/null || echo unknown)"
          negative_cases="$(jq -r '.negative_cases // "unknown"' "$summary_file" 2>/dev/null || echo unknown)"
          {
            echo "wordpress-image=${wordpress_image:-unknown}"
            echo "wordpress-version=${wordpress_version:-unknown}"
            echo "php-version=${php_version:-unknown}"
            echo "mysql-image=${mysql_image:-unknown}"
            echo "mysql-version=${mysql_version:-unknown}"
            echo "mcp-adapter-release=${mcp_adapter_release:-unknown}"
            echo "mcp-adapter-version=${mcp_adapter_version:-unknown}"
            echo "plugin-version=${plugin_version:-unknown}"
            echo "registered-abilities=${registered_abilities:-unknown}"
            echo "covered-abilities=${covered_abilities:-unknown}"
            echo "test-cases=${test_cases:-unknown}"
            echo "negative-cases=${negative_cases:-unknown}"
          } >> "$GITHUB_OUTPUT"

      - name: Check WordPress debug log for errors
        if: always()
        run: |
          echo "=== WordPress Debug Log ==="
          docker compose exec -T wordpress cat /var/www/html/wp-content/debug.log || true

      - name: Collect E2E failure artifacts
        if: failure()
        shell: bash
        run: |
          mkdir -p e2e-artifacts
          docker compose logs --no-color > e2e-artifacts/docker-compose.log || true
          docker compose exec -T wordpress cat /var/www/html/wp-content/debug.log > e2e-artifacts/wordpress-debug.log 2>/dev/null || true

      - name: Clean up
        if: always()
        run: docker compose down -v

      - name: Upload E2E failure artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-failure-artifacts
          path: e2e-artifacts/
          if-no-files-found: ignore

  comment-pr:
    needs: [changes, e2e-test]
    if: github.event_name == 'pull_request' && needs.changes.outputs.should-run == 'true' && always()
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Comment E2E result on PR
        env:
          GH_TOKEN: ${{ github.token }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          ISSUE_NUMBER: ${{ github.event.pull_request.number }}
          E2E_RESULT: ${{ needs.e2e-test.result }}
          WORDPRESS_IMAGE: ${{ needs.e2e-test.outputs.wordpress-image }}
          WORDPRESS_VERSION: ${{ needs.e2e-test.outputs.wordpress-version }}
          PHP_VERSION: ${{ needs.e2e-test.outputs.php-version }}
          MYSQL_IMAGE: ${{ needs.e2e-test.outputs.mysql-image }}
          MYSQL_VERSION: ${{ needs.e2e-test.outputs.mysql-version }}
          MCP_ADAPTER_RELEASE: ${{ needs.e2e-test.outputs.mcp-adapter-release }}
          MCP_ADAPTER_VERSION: ${{ needs.e2e-test.outputs.mcp-adapter-version }}
          PLUGIN_VERSION: ${{ needs.e2e-test.outputs.plugin-version }}
          REGISTERED_ABILITIES: ${{ needs.e2e-test.outputs.registered-abilities }}
          COVERED_ABILITIES: ${{ needs.e2e-test.outputs.covered-abilities }}
          TEST_CASES: ${{ needs.e2e-test.outputs.test-cases }}
          NEGATIVE_CASES: ${{ needs.e2e-test.outputs.negative-cases }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          HEAD_SHA: ${{ github.sha }}
        shell: bash
        run: |
          set -euo pipefail
          VERSIONS=$'\n\n### Tested versions\n\n'
          VERSIONS+="- WordPress Docker image: ${WORDPRESS_IMAGE:-unknown}"$'\n'
          VERSIONS+="- WordPress core: ${WORDPRESS_VERSION:-unknown}"$'\n'
          VERSIONS+="- PHP: ${PHP_VERSION:-unknown}"$'\n'
          VERSIONS+="- MySQL Docker image: ${MYSQL_IMAGE:-unknown}"$'\n'
          VERSIONS+="- MySQL server: ${MYSQL_VERSION:-unknown}"$'\n'
          VERSIONS+="- MCP Adapter release: ${MCP_ADAPTER_RELEASE:-unknown}"$'\n'
          VERSIONS+="- MCP Adapter plugin: ${MCP_ADAPTER_VERSION:-unknown}"$'\n'
          VERSIONS+="- Unlock MCP Potential: ${PLUGIN_VERSION:-unknown}"$'\n'
          VERSIONS+="- Commit: ${HEAD_SHA:-unknown}"$'\n'
          VERSIONS+="- Workflow run: ${RUN_URL:-unknown}"
          COVERAGE=$'\n\n### Ability coverage\n\n'
          COVERAGE+="- Registered unlock-mcp-potential abilities: ${REGISTERED_ABILITIES:-unknown}"$'\n'
          COVERAGE+="- Manifest-covered abilities: ${COVERED_ABILITIES:-unknown}"$'\n'
          COVERAGE+="- Manifest test cases: ${TEST_CASES:-unknown}"$'\n'
          COVERAGE+="- Negative permission cases: ${NEGATIVE_CASES:-unknown}"
          if [ "$E2E_RESULT" = "success" ]; then
            BODY=$'## E2E QA Tests Passed\n\n- Docker WordPress stack started\n- WordPress core installed before plugin activation\n- MCP Adapter installed from official WordPress release asset\n- Manifest covers every registered unlock-mcp-potential ability\n- Ability execution tests passed\n- PHP syntax checks passed\n- WordPress debug log scan found no fatal/error-level entries'
          else
            BODY=$"## E2E QA Tests Failed\n\n- Result: ${E2E_RESULT}\n- Review this workflow run and uploaded E2E failure artifacts for the failed setup/test phase details."
          fi
          BODY+="$COVERAGE$VERSIONS"
          gh api "repos/$OWNER/$REPO/issues/$ISSUE_NUMBER/comments" --method POST -f body="$BODY"

  skip-summary:
    needs: changes
    if: needs.changes.outputs.should-run != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Report skipped run
        run: |
          echo "E2E QA skipped: no relevant files changed."
          echo "Changed files:"
          echo "${{ needs.changes.outputs.changed-files }}"
