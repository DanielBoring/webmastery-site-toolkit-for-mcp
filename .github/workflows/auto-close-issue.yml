name: Auto-close Issue on PR Merge

on:
  pull_request:
    types: [closed]

permissions:
  issues: write
  pull-requests: read

jobs:
  auto-close-issue:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    
    steps:
      - name: Extract issue number from PR body
        id: extract
        run: |
          PR_BODY="${{ github.event.pull_request.body }}"
          
          # Look for "Closes #NUMBER" or "Fixes #NUMBER"
          ISSUE_NUMBER=$(echo "$PR_BODY" | grep -oP '(?:Closes|Fixes|Resolves)\s+#\K[0-9]+' | head -1)
          
          if [ -n "$ISSUE_NUMBER" ]; then
            echo "issue-number=$ISSUE_NUMBER" >> $GITHUB_OUTPUT
            echo "Found linked issue: #$ISSUE_NUMBER"
          else
            echo "No linked issue found in PR body"
          fi
      
      - name: Add final comment to issue
        if: steps.extract.outputs.issue-number != ''
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = ${{ steps.extract.outputs.issue-number }};
            const prNumber = ${{ github.event.pull_request.number }};
            const prUrl = ${{ github.event.pull_request.html_url }};
            
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: `🎉 Completed by PR #${prNumber}\n\n✓ All E2E QA tests passed\n✓ Code reviewed and merged\n✓ Released in production\n\n[View PR](${prUrl})`
            });
      
      - name: Close issue
        if: steps.extract.outputs.issue-number != ''
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = ${{ steps.extract.outputs.issue-number }};
            
            github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              state: 'closed'
            });
            
            console.log(`Closed issue #${issueNumber}`);
